# =============================================================================
#  STORE SUPPORT / ORDER-TRACKER BOT — CONFIG
# =============================================================================
#  Edit THIS file to customize everything. You don't need to touch bot.py.
#  Rules: spaces not tabs · "quoted" text is yours · "" = no emoji ·
#         {placeholders} are filled in automatically.
# =============================================================================

# ----- SERVER SETTINGS (numeric IDs — see README) ----------------------------
server:
  tickets_channel_id: 0     # where /setup posts the panel (0 = current channel)
  ticket_category_id: 0     # category new tickets go under (0 = none)
  staff_role_id: 0          # role that sees all tickets, can run mod commands
  guild_id: 0               # your server ID (recommended: instant slash commands)

# ----- COLORS ----------------------------------------------------------------
appearance:
  primary_color: "#5865F2"
  success_color: "#57F287"
  danger_color:  "#ED4245"
  sale_color:    "#FEE75C"
  info_color:    "#5DADEC"

# ----- THE SALE --------------------------------------------------------------
sale:
  enabled: true
  discount_percent: 65       # % off the base price
  deposit_percent: 25        # % of base due upfront

# ----- STORE REGIONS / DOMAINS (1st dropdown) --------------------------------
regions:
  - id: "com"
    label: "United States of America"
    domain: "eg. apple.com"
    emoji: "🇺🇸"
    symbol: "$"
  - id: "ca"
    label: "Canada"
    domain: "yourstore.ca"
    emoji: "🇨🇦"
    symbol: "$"
  - id: "eu"
    label: "Europe"
    domain: "yourstore.eu"
    emoji: "🇪🇺"
    symbol: "€"
  - id: "other"
    label: "Other (Ask for eligibility)"
    domain: "yourstore.eu"
    emoji: "🌍"
    symbol: "€"

# ----- ISSUE TYPES (2nd dropdown) --------------------------------------------
issues:
  - id: "apple"
    label: "Apple"
    emoji: "🍎"
  - id: "amazon"
    label: "Amazon"
    emoji: "📦"

# ----- PRODUCTS (3rd dropdown) — REPLACE WITH YOUR REAL PRODUCTS -------------
#  ELIGIBILITY BY ISSUE (optional):
#    excluded_issues: ["refund"]   -> hide this product when that issue is picked
#                                     (e.g. final-sale items can't be refunded)
#    allowed_issues:  ["shipping"] -> ONLY show it for these issues
# also  " discount_percent: 70 "
#    (omit both = available for every issue)  The ids must match the "issues" list.
products:
  - id: "product_a"
    label: "iPhone 17e"
    emoji: "📱"
    prices: { com: 120, ca: 160, eu: 110 }
    excluded_issues: ["amazon"]   
  - id: "product_b"
    label: "iPhone 17"
    emoji: "📱"
    prices: { com: 180, ca: 240, eu: 170 }
    excluded_issues: ["amazon"] 

# ----- TICKET STATUSES (used by /setstatus, renames channel, DMs owner) ------
statuses:
  - id: "open"
    label: "Open"
    emoji: "🟢"
  - id: "awaiting"
    label: "Awaiting Support"
    emoji: "🟡"
  - id: "in_progress"
    label: "In Progress"
    emoji: "🔵"
  - id: "completed"
    label: "Completed"
    emoji: "✅"
  - id: "successful"
    label: "Successful"
    emoji: "💚"
  - id: "failed"
    label: "Failed"
    emoji: "🔴"

# ----- CREDITS SYSTEM --------------------------------------------------------
credits:
  symbol: "$"
  starting_balance: 0

# ----- ALL TEXT --------------------------------------------------------------
text:
  panel:
    title: "🛍️ Customer Support & Order Help"
    description: >
      Need help with an order? Open a support ticket in a few quick taps.
      We'll confirm your order, see how we can help, and make sure you still
      get the most out of your current deal. 💛
    footer: "YourStore Support"
    link_button:
      label: "Visit Our Store"
      emoji: "🔗"
      url: "https://yourstore.com"
    start_button:
      label: "Open a Support Ticket"
      emoji: "🎫"

  steps:
    title: "New Support Ticket"
    choose_region: "Which store did you order from?"
    choose_issue: "What can we help you with?"
    choose_product: "Which product is this about?"
    no_products: "😕 Sorry — none of our products are eligible for **{issue}** (some items are final sale). Please pick a different option below."
    progress: "{bar}  Step {n} of {total}"

  sale:
    title: "🔥 Your Exclusive Deal Is Still Active!"
    line_was: "Regular price: ~~{base}~~"
    line_off: "**{percent}% OFF** applied 🎉"
    line_total: "**Your total today: {final}**"
    line_deposit: "💳 Due upfront now: **{deposit}**"
    line_savings: "🤑 You're saving **{savings}**!"
    open_button:
      label: "Open My Ticket"
      emoji: "🎟️"

  # In-ticket welcome + the button that starts the detail forms
  details:
    welcome_title: "🎫 Ticket {order_no} — Welcome!"
    welcome_body: >
      {user}, your ticket is open! 💛 To help us sort this fast, tap
      **Provide Order Details** below and fill in the short form.
      Save your order number **{order_no}** — you can reopen this ticket
      anytime with `/lookup {order_no}`.
    provide_button:
      label: "Provide Order Details"
      emoji: "📝"
    posted_title: "📋 Customer Order Details"
    all_done: "✅ All set! Your details have been added to the ticket above. You can tap the button again anytime to update them."
    saved_step: "Saved! Tap **Continue** for the next part."

  forms:
    order:
      title: "Step 1/4 · Order Info"
      header: "ORDER INFORMATION"
      order_number: "Order Number"
      order_number_ph: "e.g. #1024"
      order_total: "Order Total"
      order_total_ph: "e.g. $129.99"
      order_date: "Order Date"
      order_date_ph: "e.g. 2026-06-01"
      delivery_date: "Delivery Date (or expected)"
      delivery_date_ph: "optional"
      items: "Items Ordered"
      items_ph: "List the items in your order"
    personal:
      title: "Step 2/4 · Your Details"
      header: "YOUR DETAILS"
      name: "Name On Order"
      name_ph: "Full name used at checkout"
      email: "Email (optional)"
      email_ph: "Helps us find your order faster"
      phone: "Phone Number"
      phone_ph: "Best number to reach you"
      notes: "Anything else? (optional)"
      notes_ph: "Any other details you'd like to add"
    shipping:
      title: "Step 3/4 · Shipping"
      header: "SHIPPING ADDRESS"
      street: "Street Address"
      city: "City"
      state: "State / Province"
      zip: "Zip / Postal Code"
      country: "Country"
    billing:
      title: "Step 4/4 · Billing"
      header: "BILLING ADDRESS"
      street: "Street Address"
      city: "City"
      state: "State / Province"
      zip: "Zip / Postal Code"
      country: "Country"
      same_button: "Same as shipping ✅"
      different_button: "Enter a different address"
      prompt: "Is your billing address the same as your shipping address?"

  ticket:
    footer: "YourStore Support • Keep your order number safe"
    close_button:
      label: "Close Ticket"
      emoji: "🔒"
    support_button:
      label: "Request Support"
      emoji: "🆘"
    support_message: "{staff} — a customer has requested support here."
    closing_message: "🔒 This ticket will close in 5 seconds…"

  dm:
    title: "🎫 Your Support Ticket Is Open"
    body: >
      Thanks for contacting YourStore Support! Here are your ticket details —
      please keep them safe.


      **Order number:** {order_no}

      **Reopen anytime:** use `/lookup {order_no}` in the server.


      [Jump to your ticket]({link})

  status:
    # Shown in the channel + DM'd to the customer when status changes.
    changed_channel: "📣 Status updated to **{emoji} {label}** by {mod}."
    dm_title: "📣 Update On Your Ticket {order_no}"
    dm_body: "Your ticket **{order_no}** is now: **{emoji} {label}**."
    current: "Current status of this ticket: **{emoji} {label}**"

  credits_text:
    granted_dm_title: "💰 You received credits!"
    granted_dm_body: "You've been granted **{symbol}{amount}** in credits. New balance: **{symbol}{balance}**.{reason}"
    removed_dm_body: "**{symbol}{amount}** in credits was removed. New balance: **{symbol}{balance}**.{reason}"
    balance_self: "💰 Your credit balance: **{symbol}{balance}**"
    balance_other: "💰 {user}'s balance: **{symbol}{balance}**"
    added: "✅ Added **{symbol}{amount}** to {user}. New balance: **{symbol}{balance}**."
    removed: "✅ Removed **{symbol}{amount}** from {user}. New balance: **{symbol}{balance}**."
    set: "✅ Set {user}'s balance to **{symbol}{balance}**."
    leaderboard_title: "🏆 Credit Leaderboard"
    leaderboard_empty: "No credits have been issued yet."

  lookup:
    description: "Look up one of your support tickets by order number."
    not_found: "🔎 I couldn't find a ticket with order number **{order_no}** that you have access to."
    found: "✅ Found it! Here's your ticket: {channel}\nOrder number: **{order_no}**"

  errors:
    no_permission: "⚠️ You don't have permission to do that."
    staff_only: "⚠️ This command is for staff only."
    not_in_ticket: "⚠️ Use this command inside a ticket channel."
    bad_amount: "⚠️ Please enter an amount greater than 0."
    generic: "⚠️ Something went wrong. Please try again."
