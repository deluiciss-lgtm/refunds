# =============================================================================
#  ORDER TICKET BOT — CONFIG FILE
# =============================================================================
#  This is the ONLY file you need to edit for normal customization.
#  You do NOT need to touch bot.py to change text, colors, companies,
#  products, prices, or which channels/roles the bot uses.
#
#  Tips:
#    - Keep the indentation (spaces, not tabs). Copy an existing block when
#      adding new things so the spacing stays correct.
#    - Anything in "quotes" is text you can freely rewrite.
#    - Emoji can be a normal emoji like "🍎" or left as "" for none.
#    - IDs (numbers) are explained in the README (How to get IDs section).
# =============================================================================


# -----------------------------------------------------------------------------
#  SERVER SETTINGS  (the numeric IDs — see README "How to get IDs")
# -----------------------------------------------------------------------------
server:
  # The channel where the /setup command posts the main panel.
  # Set to 0 to just post the panel in whatever channel you run /setup in.
  tickets_channel_id: 0

  # New order tickets are created as channels UNDER this category.
  # Set to 0 to create them with no category (top of the channel list).
  ticket_category_id: 0

  # The staff role that can see every ticket and gets pinged by "Request Support".
  # Set to 0 to disable staff features.
  staff_role_id: 0

  # OPTIONAL: your server (guild) ID. If set, slash commands appear INSTANTLY
  # in that one server. If left at 0, commands sync globally (can take ~1 hour
  # the first time). For a single server, setting this is recommended.
  guild_id: 0


# -----------------------------------------------------------------------------
#  COLORS  (hex codes — pick any color you like)
# -----------------------------------------------------------------------------
appearance:
  primary_color: "#5865F2"   # main embeds (panel, steps, ticket info)
  success_color: "#57F287"   # confirmation / confirm button accents
  danger_color:  "#ED4245"   # cancel / close accents


# -----------------------------------------------------------------------------
#  ALL TEXT  (rewrite any of this freely)
# -----------------------------------------------------------------------------
text:

  # ----- The panel message posted by /setup -----
  panel:
    title: "🛒 Welcome to the Order Desk!"
    description: >
      Place an order in just a few taps. Click the button below to choose a
      company, region, and product — then confirm and a private ticket will be
      opened for you with our team.
    footer: "Order Desk • Powered by You"
    # Optional link button (e.g. terms, website). Set url to "" to hide it.
    link_button:
      label: "Learn More"
      emoji: "🔗"
      url: "https://example.com"
    start_button:
      label: "Start an Order"
      emoji: "🛒"

  # ----- Step prompts (the dropdown placeholders / step embed) -----
  steps:
    title: "New Order"
    choose_company: "Choose a company…"
    choose_region: "Choose a region…"
    choose_product: "Choose a product…"

  # ----- The order details form (modal) -----
  modal:
    title: "Order Details"
    quantity_label: "Quantity"
    quantity_placeholder: "How many would you like? (e.g. 1)"
    notes_label: "Notes (optional)"
    notes_placeholder: "Anything else we should know?"

  # ----- The confirmation message (only the buyer sees this) -----
  confirmation:
    title: "🧾 Order Confirmation"
    description: "Please review your order below and confirm to open a ticket."
    footer: "Order Desk • Powered by You"
    confirm_button:
      label: "Confirm Order"
      emoji: "✅"
    cancel_button:
      label: "Cancel"
      emoji: "✖️"
    cancelled_message: "❌ Order cancelled. You can start again any time."
    created_message: "✅ Your ticket has been created: {channel}"

  # ----- The embed posted inside the new ticket channel -----
  ticket:
    title: "📦 Order Information"
    # {user} becomes a ping/mention of the buyer.
    notice: >
      {user}, thanks for your order! A member of our team will be with you
      shortly. Please don't share passwords or other sensitive information here.
    footer: "Order Desk • Powered by You"
    close_button:
      label: "Close Ticket"
      emoji: "🔒"
    support_button:
      label: "Request Support"
      emoji: "🆘"
    # Sent when someone clicks Request Support. {staff} becomes the staff ping.
    support_message: "{staff} — support has been requested in this ticket."
    # Shown briefly before a ticket is deleted on close.
    closing_message: "🔒 Closing this ticket in 5 seconds…"

  # ----- Error messages -----
  errors:
    invalid_quantity: "⚠️ Please enter a valid whole number greater than 0."
    try_again_button: "Try Again"
    no_permission: "⚠️ You don't have permission to do that."


# -----------------------------------------------------------------------------
#  COMPANIES  (this is where you add your products!)
# -----------------------------------------------------------------------------
#  HOW TO ADD A NEW COMPANY:
#    Copy the whole "apple:" block, paste it below, rename the key
#    (e.g. "samsung:"), and edit the labels, regions, and products.
#
#  HOW PRICING WORKS:
#    Each product lists a price PER REGION using the region's id.
#    Example: prices: { na: 1299, eu: 1449 }
#    "na" and "eu" must match the region ids you defined under "regions".
#    The order total = price-for-chosen-region × quantity + fee.
# -----------------------------------------------------------------------------
companies:

  apple:
    label: "Apple"
    emoji: "🍎"
    fee: 0          # flat fee added to every order for this company (0 = none)

    regions:
      - id: "na"
        label: "Canada / US"
        emoji: "🌎"
        symbol: "$"     # currency symbol shown next to prices
      - id: "eu"
        label: "Europe"
        emoji: "🇪🇺"
        symbol: "€"

    products:
      - id: "macbook"
        label: "MacBook"
        emoji: "💻"
        prices: { na: 1099, eu: 1199 }
      - id: "macbook_air"
        label: "MacBook Air"
        emoji: "💻"
        prices: { na: 1299, eu: 1449 }
      - id: "macbook_pro"
        label: "MacBook Pro"
        emoji: "💻"
        prices: { na: 1999, eu: 2199 }
      - id: "iphone_17_pro"
        label: "iPhone 17 Pro"
        emoji: "📱"
        prices: { na: 1099, eu: 1249 }

  # ---- Example of a SECOND company (delete or edit freely) ----
  samsung:
    label: "Samsung"
    emoji: "📱"
    fee: 0
    regions:
      - id: "na"
        label: "Canada / US"
        emoji: "🌎"
        symbol: "$"
      - id: "eu"
        label: "Europe"
        emoji: "🇪🇺"
        symbol: "€"
    products:
      - id: "galaxy_s25"
        label: "Galaxy S25"
        emoji: "📱"
        prices: { na: 899, eu: 999 }
      - id: "galaxy_book"
        label: "Galaxy Book"
        emoji: "💻"
        prices: { na: 1099, eu: 1199 }
